name: Aggregate Quantum Computing Content

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch: # Enable manual trigger

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run Aggregator Script
        run: npx tsx scripts/aggregate-content.ts

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Quantum Content Bot"
          git config --global user.email "bot@quantumcomputinginfo.com"
          git add content/
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No new content aggregated. Exiting."
          else
            git commit -m "Automated Content Aggregation: $(date -u +'%Y-%m-%d %H:%M:%SZ')"
            git push origin main
          fi
